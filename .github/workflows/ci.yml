name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax checks
        run: npm run lint

      - name: Regression tests
        run: npm test

      - name: Collect coverage baseline
        shell: bash
        run: |
          mkdir -p coverage
          set -o pipefail
          npm run test:coverage | tee coverage/node-test-coverage.txt

      - name: TypeScript validation
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-coverage
          path: coverage/node-test-coverage.txt
          if-no-files-found: error
          retention-days: 14
