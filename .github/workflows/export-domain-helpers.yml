name: Export deterministic process helpers

on:
  push:
    branches: [chore/dermbrief-actions-depth]
    paths:
      - '.github/workflows/export-domain-helpers.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dermbrief-domain-helper-export
  cancel-in-progress: false

jobs:
  export-helpers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: chore/dermbrief-actions-depth

      - name: Export pure deterministic helpers
        shell: python
        run: |
          from pathlib import Path

          path = Path('api/process-evidence.js')
          content = path.read_text()
          names = ['articleText', 'scoreArticle', 'findResultSentence', 'makeCard', 'events']
          for name in names:
              old = f'function {name}('
              new = f'export function {name}('
              if content.count(old) != 1:
                  raise SystemExit(f'Expected one declaration for {name}, found {content.count(old)}')
              content = content.replace(old, new, 1)
          path.write_text(content)

      - name: Verify mutation scope
        shell: bash
        run: |
          test "$(git diff --name-only)" = 'api/process-evidence.js'
          git diff --check
          for name in articleText scoreArticle findResultSentence makeCard events; do
            grep -q "export function ${name}(" api/process-evidence.js
          done

      - name: Commit helper exports
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add api/process-evidence.js
          git commit -m 'Export deterministic process helpers for testing'
          git push origin HEAD:chore/dermbrief-actions-depth
