name: Bug report
description: Report reproducible product, evidence, or developer behavior.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior and its impact.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the PMID, route, inputs, and sequence when relevant. Do not include patient information or secrets.
      placeholder: |
        1. Open...
        2. Enter...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: safety
    attributes:
      label: Safety boundary affected
      options:
        - None known
        - Source grounding
        - Journal allowlisting
        - Evidence scoring
        - Physician approval
        - Audit trail
        - Credentials or privacy
        - Unsure
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Supporting evidence
      description: Add screenshots, logs, or links after removing private information.
