name: Feature request
description: Propose a focused product, evidence, or developer improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: user
    attributes:
      label: Intended user and problem
      description: Who needs this and what is currently difficult or unsafe?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable success without prescribing the implementation.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence or workflow basis
      description: Cite the clinical, product, or engineering workflow that supports the request.

  - type: dropdown
    id: checkpoint
    attributes:
      label: Required human checkpoint
      options:
        - Physician approval before publication
        - Physician review before use
        - Maintainer review only
        - No new checkpoint
        - Unsure
    validations:
      required: true

  - type: textarea
    id: failure
    attributes:
      label: Important failure modes
      description: What should the system refuse, disclose, or fall back to?
    validations:
      required: true
